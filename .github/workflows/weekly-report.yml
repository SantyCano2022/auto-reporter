name: weekly-report

# Hard Requirement 1: NO `push` trigger — the state commit below can never
# re-trigger this workflow structurally. `[skip ci]` in the commit message is
# the second defense layer in case a push trigger is ever added.
on:
  schedule:
    - cron: "0 16 * * 5" # Friday 16:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install .
      - name: Generate and deliver weekly report
        env:
          # HR2: every credential comes from Actions Secrets; none live in the repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TG_CHAT_TECHNICAL: ${{ secrets.TG_CHAT_TECHNICAL }}
          TG_CHAT_EXECUTIVE: ${{ secrets.TG_CHAT_EXECUTIVE }}
          TG_CHAT_CLIENT: ${{ secrets.TG_CHAT_CLIENT }}
        run: auto-reporter run
      - name: Commit state (only reached on success)
        run: |
          git config user.name "auto-reporter-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "state unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          # main may have advanced mid-run (e.g. a manual push); rebase + retry so
          # a delivered report is never marked failed by a lost push race.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $attempt failed; retrying"
            sleep $((attempt * 5))
          done
          exit 1
      - name: Alert technical chat on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_TECHNICAL: ${{ secrets.TG_CHAT_TECHNICAL }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        # Plain curl, independent of the Python app, so the alert fires even when
        # the failure was inside auto-reporter. GitHub masks the bot token in logs.
        run: |
          curl -sS --fail-with-body \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_TECHNICAL}" \
            --data-urlencode "text=⚠️ Auto-Reporter: el reporte semanal de ${REPO} FALLÓ. Revisa el run: ${RUN_URL}" \
            -w 'telegram_http=%{http_code}\n'
